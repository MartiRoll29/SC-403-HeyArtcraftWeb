spring.application.name=HeyArtcraftWeb

# --- Base de datos MySQL (crear con database/heyartcraft_schema.sql en Workbench) ---
spring.datasource.url=jdbc:mysql://localhost:3306/heyartcraft_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf ---
spring.thymeleaf.cache=false

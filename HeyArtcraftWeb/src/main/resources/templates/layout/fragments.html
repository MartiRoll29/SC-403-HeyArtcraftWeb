<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Fragmento de <head> reutilizable en todas las vistas -->
    <th:block th:fragment="head(titulo)">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title th:text="${titulo} + ' - Hey Artcrafts'">Hey Artcrafts</title>
        <link rel="icon" th:href="@{/img/logo-proyecto.png}"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
        <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    </th:block>
</head>
<body>
    <!-- Barra de navegación -->
    <nav th:fragment="nav" class="navbar navbar-expand-lg navbar-hey mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/catalogo}">
                <img th:src="@{/img/logoblanco.png}" alt="Hey Artcrafts"/>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarHey">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarHey">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/catalogo}">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link position-relative" th:href="@{/carrito}">
                            <i class="bi bi-cart3"></i> Carrito
                            <span th:if="${carritoCount != null and carritoCount > 0}"
                                  th:text="${carritoCount}"
                                  class="badge rounded-pill badge-carrito position-absolute top-0 start-100 translate-middle">
                            </span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Pie de página -->
    <footer th:fragment="footer" class="footer-hey text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Hey Artcrafts &mdash; Artículos personalizados en madera y acrílico.</p>
        </div>
    </footer>

    <th:block th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </th:block>
</body>
</html>

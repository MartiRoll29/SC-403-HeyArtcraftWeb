<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(titulo='Catálogo')}"></head>
<body>
    <nav th:replace="~{layout/fragments :: nav}"></nav>

    <div class="container">
        <h1 class="mb-4" style="color: var(--color-walnut);">Nuestro Catálogo</h1>

        <div th:if="${#lists.isEmpty(productos)}" class="alert alert-warning">
            Todavía no hay productos disponibles en el catálogo.
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            <div class="col" th:each="producto : ${productos}">
                <div class="card h-100 card-producto">
                    <a th:href="@{/catalogo/{id}(id=${producto.id})}">
                        <img th:src="@{${producto.imagenUrl}}" class="card-img-top" th:alt="${producto.nombre}"/>
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${producto.nombre}">Nombre del producto</h5>
                        <p class="card-text fw-bold mt-auto"
                           th:text="${'₡' + #numbers.formatDecimal(producto.precio, 1, 'COMMA', 0, 'POINT')}">
                            ₡0
                        </p>
                        <a class="btn btn-hey" th:href="@{/catalogo/{id}(id=${producto.id})}">Ver detalle</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/fragments :: footer}"></footer>
    <th:block th:replace="~{layout/fragments :: scripts}"></th:block>
</body>
</html>

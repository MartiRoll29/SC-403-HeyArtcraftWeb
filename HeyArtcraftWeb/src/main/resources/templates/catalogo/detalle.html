<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head(titulo=${producto.nombre})}"></head>
<body>
    <nav th:replace="~{layout/fragments :: nav}"></nav>

    <div class="container">
        <a th:href="@{/catalogo}" class="btn btn-link mb-3">&larr; Volver al catálogo</a>

        <div class="row g-4">
            <div class="col-md-6">
                <img th:src="@{${producto.imagenUrl}}" th:alt="${producto.nombre}" class="img-fluid rounded shadow-sm"/>
            </div>
            <div class="col-md-6">
                <h1 th:text="${producto.nombre}" style="color: var(--color-walnut);">Nombre del producto</h1>
                <p class="text-muted" th:text="${producto.descripcion}">Descripción del producto.</p>
                <p class="fs-3 fw-bold"
                   th:text="${'₡' + #numbers.formatDecimal(producto.precio, 1, 'COMMA', 0, 'POINT')}">
                    ₡0
                </p>

                <form th:action="@{/carrito/agregar}" method="post" class="mt-4">
                    <input type="hidden" name="productoId" th:value="${producto.id}"/>

                    <div class="mb-3" th:if="${producto.personalizable}">
                        <label for="textoPersonalizado" class="form-label fw-semibold">Texto personalizado</label>
                        <input type="text" class="form-control" id="textoPersonalizado" name="textoPersonalizado"
                               placeholder="Ej: Familia Rodríguez / Nombres / Fecha" maxlength="255"/>
                    </div>

                    <div class="mb-3" th:if="${producto.tamanosDisponibles != null}">
                        <label for="tamanoSeleccionado" class="form-label fw-semibold">Tamaño</label>
                        <select class="form-select" id="tamanoSeleccionado" name="tamanoSeleccionado">
                            <option th:each="tamano : ${#strings.arraySplit(producto.tamanosDisponibles, ',')}"
                                    th:value="${tamano}" th:text="${tamano}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="especificaciones" class="form-label fw-semibold">Especificaciones adicionales</label>
                        <textarea class="form-control" id="especificaciones" name="especificaciones" rows="3"
                                  placeholder="Color, detalles especiales, referencias, etc."></textarea>
                    </div>

                    <button type="submit" class="btn btn-hey btn-lg">
                        <i class="bi bi-cart-plus"></i> Añadir al carrito
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/fragments :: footer}"></footer>
    <th:block th:replace="~{layout/fragments :: scripts}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    
    <!-- Fragmento head -->
    <head th:fragment="head">
        <meta charset="UTF-8">
        <!-- Bootstrap y FontAwesome desde WebJars -->
        <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.7/css/bootstrap.min.css}"/>
        <link rel="stylesheet" th:href="@{/webjars/font-awesome/7.0.0/css/all.css}"/>
        <link th:href="@{/css/estilos.css}" rel="stylesheet"/>
    </head>
    
    <body>
        <!-- Agregar categoría -->
        <section th:fragment="agregar_categoria">
            <div class="d-flex justify-content-center my-3">
                <button type="button" class="btn btn-success rounded-pill px-4 mb-3"
                        data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
                    <i class="fa-solid fa-plus"></i> [[#{categoria.agregar}]]
                </button>
            </div>
            <div class="modal fade" id="agregarCategoriaModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post">
                            <!-- Header -->
                            <div class="modal-header">
                                <h5 class="modal-title">[[#{categoria.agregar}]]</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            
                            <!-- Body -->
                            <div class="modal-body">
                                <label>[[#{categoria.nombre}]]</label>
                                <input type="text" th:field="*{nombre}" class="form-control" required/>
                            </div>
                            
                            <!-- Footer -->
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-custom">
                                    <i class="fa-solid fa-floppy-disk"></i> [[#{accion.guardar}]]
                                </button>
                                <button type="button" class="btn btn-custom" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Editar categoría -->
        <section th:fragment="editar_categoria(c)">
            <div class="modal fade" th:id="'editarCategoriaModal__' + ${c.id}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/categoria/guardar}" method="post">
                            <!-- Header -->
                            <div class="modal-header">
                                <h5 class="modal-title">[[#{categoria.editar}]]</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>

                            <!-- Body -->
                            <div class="modal-body mb-3 text-start">
                                <input type="hidden" name="id" th:value="${c.id}"/>

                                <label>[[#{categoria.nombre}]]</label>
                                <input type="text" name="nombre" th:value="${c.nombre}" class="form-control" required/>
                            </div>

                            <!-- Footer -->
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-custom">
                                    <i class="fa-solid fa-floppy-disk"></i> [[#{accion.guardar}]]
                                </button>
                                <button type="button" class="btn btn-custom" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        
        <!-- Eliminar categoría -->
        <section th:fragment="eliminar_categoria">
            <!-- Botón eliminar categoría (solo si no tiene productos) -->
            <button type="button" class="btn btn-success rounded-pill px-4"
                    data-bs-toggle="modal"
                    th:attr="data-bs-target='#eliminarModal__' + ${c.id}"
                    th:if="${#lists.isEmpty(c.productos)}">
                <i class="fa-solid fa-minus"></i> [[#{categoria.eliminar}]]
            </button>

            <!-- Modal de confirmación -->
            <div class="modal fade" th:id="'eliminarModal__' + ${c.id}" tabindex="-1"
                 th:if="${#lists.isEmpty(c.productos)}">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <form th:action="@{/categoria/eliminar}" method="post">
                            <input type="hidden" name="id" th:value="${c.id}"/>

                            <!-- Header -->
                            <div class="modal-header bg-secondary text-white">
                                <h5 class="modal-title">[[#{accion.confirmar}]]</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>

                            <!-- Body -->
                            <div class="modal-body">
                                <p>[[#{accion.confirmar.texto1}]] <span th:text="${c.nombre}"></span>?</p>
                            </div>

                            <!-- Footer -->
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-custom">
                                    <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                </button>
                                <button type="button" class="btn btn-custom" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        
        <!-- Agregar producto -->
        <section th:fragment="agregar_producto">
            <div class="modal fade" th:id="'agregarProducto__' + ${c.id}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/producto/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data">
                            <!-- Asocia el producto a la categoría -->
                            <input type="hidden" name="categoria.id" th:value="${c.id}"/>

                            <!-- Header -->
                            <div class="modal-header">
                                <h5 class="modal-title">[[#{producto.agregar}]]</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>

                            <!-- Body -->
                            <div class="modal-body mb-3 text-start">
                                <label>[[#{producto.nombre}]]</label>
                                <input type="text" th:field="*{nombre}" class="form-control" required/>

                                <label class="mt-3">[[#{producto.precio}]]</label>
                                <input type="number" step="0.01" th:field="*{precio}" class="form-control" required/>

                                <div class="mt-3">
                                    <label>[[#{producto.imagen}]]</label>
                                    <input type="file" name="imagenFile" accept=".jpg,.jpeg,.png" class="form-control" required/>
                                </div>
                            </div>

                            <!-- Footer -->
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-custom">
                                    <i class="fa-solid fa-floppy-disk"></i> [[#{accion.guardar}]]
                                </button>
                                <button type="button" class="btn btn-custom" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Editar_producto -->
        <section th:fragment="editar_producto(p)">
            <div class="modal fade" th:id="'editarProductoModal__' + ${p.id}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/producto/guardar}" method="post" enctype="multipart/form-data">
                            <!-- Header -->
                            <div class="modal-header">
                                <h5 class="modal-title">Editar Producto</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            
                            <!-- Body -->
                            <div class="modal-body mb-3 text-start">
                                <input type="hidden" name="id" th:value="${p.id}"/>
                                <label>[[#{producto.nombre}]]</label>
                                <input type="text" name="nombre" th:value="${p.nombre}" class="form-control" required/>

                                <label class="mt-3">[[#{producto.precio}]]</label>
                                <input type="number" step="0.01" name="precio" th:value="${p.precio}" class="form-control" required/>

                                <label class="mt-3">[[#{producto.categoria}]]</label>
                                <select name="categoria.id" class="form-select" required>
                                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"
                                            th:selected="${p.categoria.id == cat.id}"></option>
                                </select>

                                <label class="mt-3">[[#{producto.imagen}]]</label>
                                <input type="file" name="imagenFile" accept=".jpg,.jpeg,.png" class="form-control"/>
                            </div>
                            
                            <!-- Footer -->
                            <div class="modal-footer d-flex justify-content-between">
                                <button type="submit" class="btn btn-custom">
                                    <i class="fa-solid fa-floppy-disk"></i> [[#{accion.guardar}]]
                                </button>
                                <button type="button" class="btn btn-custom"
                                        data-bs-toggle="modal"
                                        th:attr="data-bs-target='#confirmEliminarProducto__' + ${p.id}">
                                    <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                </button>                                
                                <button type="button" class="btn btn-custom" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Modal de confirmación de eliminación producto -->
            <div class="modal fade" th:id="'confirmEliminarProducto__' + ${p.id}" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <form th:action="@{/producto/eliminar}" method="post">
                            <input type="hidden" name="id" th:value="${p.id}"/>
                            <div class="modal-header bg-secondary text-white">
                                <h5 class="modal-title">[[#{accion.confirmar}]]</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <p>[[#{accion.confirmar.texto1}]] <span th:text="${p.nombre}"></span>?</p>
                            </div>
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-custom">
                                    <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                </button>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>

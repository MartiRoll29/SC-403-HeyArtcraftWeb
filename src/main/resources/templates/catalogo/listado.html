<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{general/fragmentos :: head}"/>
<body>
    <!-- Header -->
    <header th:replace="~{general/fragmentos :: header}"/>

    <!-- Contenedor principal -->
    <div class="container my-4">
        <div th:each="c : ${categorias}" class="text-center mb-2">            
            <!-- Título con lápiz integrado -->
            <h3 class="categoria-titulo mb-0 d-inline-flex align-items-center">
                <span th:text="${c.nombre}"></span>
                <i class="fa-solid fa-pen-to-square"
                   style="color: #3a2417; font-size: 1.2rem; margin-left: 6px; cursor: pointer;"
                   data-bs-toggle="modal"
                   th:attr="data-bs-target='#editarCategoriaModal__' + ${c.id}">
                </i>
            </h3>

            <!-- Modal editar categoría -->
            <section th:replace="~{catalogo/fragmentos :: editar_categoria(${c})}"/>
            
            <!-- Productos -->
            <div class="d-flex flex-wrap gap-3 justify-content-center mt-3">
                <div th:each="p : ${c.productos}">
                    <div class="card producto-card"
                         style="cursor: pointer;"
                         data-bs-toggle="modal"
                         th:attr="data-bs-target='#editarProductoModal__' + ${p.id}">
                        <div class="card-body text-center">
                            <img th:src="@{${p.imagen}}" class="card-img-top producto-img" alt="Imagen producto"/>
                            <h5 class="card-title" th:text="${p.nombre}"></h5>
                        </div>
                    </div>
                    <section th:replace="~{catalogo/fragmentos :: editar_producto(${p})}"/>
                </div>
                <!-- Botón agregar producto -->
                <div class="d-flex align-items-center">
                    <button type="button" class="btn btn-success rounded-circle"
                            data-bs-toggle="modal" th:attr="data-bs-target='#agregarProducto__' + ${c.id}">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <section th:replace="~{catalogo/fragmentos :: agregar_producto}"/>
                <!-- Botón eliminar categoría -->
                <section th:replace="~{catalogo/fragmentos :: eliminar_categoria}"/>
            </div>
            <hr class="categoria-divider">
        </div>
    </div>

    <!-- Botón agregar categoría -->
    <section th:replace="~{catalogo/fragmentos :: agregar_categoria}"/>

    <!-- Footer -->
    <footer th:replace="~{general/fragmentos :: footer}"/>
</body>

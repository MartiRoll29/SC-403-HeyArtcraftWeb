<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{general/fragmentos :: head}"/>
<body>
    <!-- Header -->
    <header th:replace="~{general/fragmentos :: header}"/>

    <!-- Contenedor principal -->
    <div class="container my-4">
        <div th:each="c : ${categorias}" class="text-center">
            <!-- Título de categoría -->
            <h3 class="categoria-titulo" th:text="${c.nombre}"></h3>
            
            <!-- Productos -->
            <div class="d-flex flex-wrap gap-3">
                <div class="card producto-card" th:each="p : ${c.productos}">
                    <div class="card-body text-center">
                        <img th:src="${p.imagen}" class="card-img-top producto-img" alt="Imagen producto"/>
                        <h5 class="card-title" th:text="${p.nombre}"></h5>
                    </div>
                </div>
                <!-- Botón agregar producto -->
                <button type="button" class="btn btn-success rounded-circle"
                        data-bs-toggle="modal" th:attr="data-bs-target='#agregarProducto__' + ${c.id}">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Botón global agregar categoría -->
    <div class="d-flex justify-content-center my-4">
        <button type="button" class="btn btn-success rounded-pill px-4"
                data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
            <i class="fa-solid fa-plus"></i> [[#{categoria.agregar}]]
        </button>
    </div>

    <!-- Footer -->
    <footer th:replace="~{general/fragmentos :: footer}"/>
</body>

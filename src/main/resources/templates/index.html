<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos:: head}"/>
    <body>
        <!-- Header -->
        <header th:replace="~{general/fragmentos:: header}"/>

        <!-- Hero principal (HU-06) -->
        <section class="hero">
            <div class="container">
                <div class="row align-items-center gy-4">
                    <div class="col-lg-6 hero-texto">
                        <h1 class="hero-titulo">[[#{hero.titulo}]]</h1>
                        <p class="hero-subtitulo">[[#{hero.subtitulo}]]</p>
                        <a class="btn btn-hero-cta"
                           href="https://api.whatsapp.com/send/?phone=50686986239&amp;text=Hola%2C%20quiero%20personalizar%20un%20producto&amp;type=phone_number&amp;app_absent=0"
                           target="_blank" rel="noopener">
                            <i class="fa-brands fa-whatsapp"></i> [[#{hero.boton}]]
                        </a>
                    </div>
                    <div class="col-lg-6 text-center">
                        <img src="/img/hero-producto.jpg" alt="Producto personalizado Hey Artcrafts" class="hero-img">
                    </div>
                </div>
            </div>
        </section>

        <!-- Historia del emprendimiento (HU-07) -->
        <section class="historia">
            <div class="container">
                <div class="row align-items-center gy-4">
                    <div class="col-lg-5 text-center">
                        <img src="/img/historia-producto.jpg" alt="Producto artesanal Hey Artcrafts" class="historia-img">
                    </div>
                    <div class="col-lg-7 historia-texto">
                        <h2 class="historia-titulo">[[#{historia.titulo}]]</h2>
                        <p class="historia-parrafo">[[#{historia.texto}]]</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Productos destacados (HU-09) -->
        <section class="destacados">
            <div class="container">
                <h2 class="destacados-titulo text-center">[[#{destacados.titulo}]]</h2>

                <div th:if="${#lists.isEmpty(productosDestacados)}" class="alert alert-warning text-center">
                    [[#{destacados.vacio}]]
                </div>

                <div class="d-flex flex-wrap gap-3 justify-content-center">
                    <a th:each="producto : ${productosDestacados}" th:href="@{/catalogo/{id}(id=${producto.id})}"
                       class="text-decoration-none text-reset">
                        <div class="card producto-card">
                            <div class="card-body text-center">
                                <img th:src="@{${producto.imagen}}" class="card-img-top producto-img" alt="Producto destacado"/>
                                <h5 class="card-title" th:text="${producto.nombre}"></h5>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer th:replace="~{general/fragmentos:: footer}"/>
    </body>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos:: head}"/>
    <body>
        <!-- Fondo de hojas único para Header + Hero + Conócenos + Destacados (sin costuras) -->
        <div class="home-fondo-hojas">

            <!-- Header -->
            <header th:replace="~{general/fragmentos:: header}"/>

            <!-- Hero principal (HU-06) -->
            <section class="hero-seccion">
                <div class="container">
                    <div class="hero-card">
                        <div class="row align-items-center g-4">
                            <div class="col-md-5 text-center">
                                <img src="/img/hero-corazon.png" alt="Producto personalizado Hey Artcrafts" class="hero-img-circle">
                            </div>
                            <div class="col-md-7 hero-texto">
                                <h1 class="hero-titulo">[[#{hero.titulo}]]</h1>
                                <p class="hero-subtitulo">[[#{hero.subtitulo}]]</p>
                                <a class="btn btn-hero-cta"
                                   href="https://wa.me/50686986239?text=Hola%2C%20quiero%20m%C3%A1s%20informaci%C3%B3n"
                                   target="_blank" rel="noopener">
                                    [[#{hero.boton}]]
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Conócenos / Historia del emprendimiento (HU-07 y HU-08) -->
            <section class="conocenos">
                <div class="container text-center">
                    <h2 class="conocenos-titulo">[[#{conocenos.titulo}]]</h2>
                    <p class="conocenos-texto">[[#{conocenos.texto}]]</p>

                    <div class="social-icons-conocenos">
                        <a href="https://www.instagram.com/hey_artcrafts/" target="_blank" rel="noopener" class="social-icon-circle">
                            <i class="fa-brands fa-instagram"></i>
                        </a>
                        <a href="https://api.whatsapp.com/send/?phone=50686986239&amp;text&amp;type=phone_number&amp;app_absent=0" target="_blank" rel="noopener" class="social-icon-circle">
                            <i class="fa-brands fa-whatsapp"></i>
                        </a>
                        <a href="https://www.facebook.com/HeyArtcrafts/" target="_blank" rel="noopener" class="social-icon-circle">
                            <i class="fa-brands fa-facebook"></i>
                        </a>
                        <a href="https://www.tiktok.com/@hey_artcrafts" target="_blank" rel="noopener" class="social-icon-circle">
                            <i class="fa-brands fa-tiktok"></i>
                        </a>
                    </div>
                </div>
            </section>

            <!-- Productos destacados (HU-09) -->
            <section class="destacados">
                <div class="container">
                    <div class="text-center">
                        <h2 class="destacados-titulo">[[#{destacados.titulo}]]</h2>
                    </div>

                    <div th:if="${#lists.isEmpty(productosDestacados)}" class="alert alert-warning text-center">
                        [[#{destacados.vacio}]]
                    </div>

                    <div class="d-flex flex-wrap gap-3 justify-content-center">
                        <a th:each="producto : ${productosDestacados}" th:href="@{/catalogo/{id}(id=${producto.id})}"
                           class="text-decoration-none text-reset">
                            <div class="card producto-card">
                                <div class="card-body text-center">
                                    <img th:src="@{${producto.imagen}}" class="card-img-top producto-img" alt="Producto destacado"/>
                                    <h5 class="card-title" th:text="${producto.nombre}"></h5>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </section>

        </div>

        <!-- Footer -->
        <footer th:replace="~{general/fragmentos:: footer}"/>
    </body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    
    <!-- Fragmento head -->
    <head th:fragment="head">
        <meta charset="UTF-8"/>
        <title>Hey Artcraft</title>
        <!-- Bootstrap y FontAwesome desde WebJars -->
        <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.7/css/bootstrap.min.css}"/>
        <link rel="stylesheet" th:href="@{/webjars/font-awesome/7.0.0/css/all.css}"/>
        <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
        <script th:src="@{/webjars/popper.js/2.11.7/umd/popper.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/5.3.7/js/bootstrap.min.js}"></script>
    </head>

    <body>
        <!-- Fragmento header -->
        <header th:fragment="header">
            <nav class="navbar navbar-expand-lg navbar-dark bg-success">
                <div class="container-fluid">
                    <a th:href="@{/}" class="navbar-brand text-light">[[#{aplicacion.titulo}]]</a>
                    <div class="collapse navbar-collapse">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item px-2"><a class="nav-link text-secondary" th:href="@{/categoria/listado}">[[#{plantilla.inicio}]]</a></li>
                            <li class="nav-item px-2"><a class="nav-link text-secondary" th:href="@{/servicio/listado}">[[#{plantilla.catalogo}]]</a></li>
                            <li class="nav-item px-2"><a class="nav-link text-secondary" th:href="@{/contacto/listado}">[[#{plantilla.historial}]]</a></li> 
                        </ul>
                        <i class="fa fa-user text-white"></i>
                    </div>
                </div>
            </nav>
        </header>
        
        <<!-- Fragmento footer -->
        <footer th:fragment="footer" class="bg-success text-white text-center py-3 mt-4">
            <p class="lead">[[#{plantilla.derechos}]] &COPY;</p>
            <div>
                <i class="fa-brands fa-whatsapp mx-2"></i>
                <i class="fa-brands fa-instagram mx-2"></i>
                <i class="fa-brands fa-tiktok mx-2"></i>
            </div>
        </footer>
    </body>
</html>

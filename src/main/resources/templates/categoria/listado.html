<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body class="bg-dark text-light">
        <header th:replace="~{general/fragmentos :: header}"/>

        <div class="container my-4">
            <div th:each="c : ${categorias}">
                <h3 class="text-light mb-3" th:text="${c.nombre}"></h3>
                <div class="d-flex flex-wrap gap-3">
                    <div class="card bg-dark text-light border-secondary" style="width: 14rem;"
                         th:each="p : ${c.productos}">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${p.nombre}"></h5>
                            <p class="card-text">₡ <span th:text="${p.precio}"></span></p>
                            <div class="d-flex justify-content-between">
                                <a href="#" class="btn btn-sm btn-outline-secondary"
                                   data-bs-toggle="modal" th:attr="data-bs-target='#editarProducto__' + ${p.id}">
                                    <i class="fa fa-pencil-alt"></i>
                                </a>
                                <a href="#" class="btn btn-sm btn-outline-danger"
                                   data-bs-toggle="modal" th:attr="data-bs-target='#eliminarProducto__' + ${p.id}">
                                    <i class="fa fa-trash"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Botón agregar producto -->
                <div class="mt-2">
                    <button type="button" class="btn btn-success rounded-circle"
                            data-bs-toggle="modal" th:attr="data-bs-target='#agregarProducto__' + ${c.id}">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Botón global agregar categoría -->
        <div class="d-flex justify-content-center my-4">
            <button type="button" class="btn btn-success rounded-pill px-4"
                    data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
                <i class="fa-solid fa-plus"></i> [[#{categoria.agregar}]]
            </button>
        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>
        </body>
        </html>

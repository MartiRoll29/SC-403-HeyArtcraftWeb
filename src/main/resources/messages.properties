historia.titulo=Nuestra historia
historia.texto=Hey! Artcrafts naci\u00f3 de la pasi\u00f3n por transformar la madera en piezas con significado. Cada corte, cada letra y cada detalle est\u00e1 pensado para contar tu historia: la de tu familia, tu boda o ese regalo que quieres hacer inolvidable. Creemos en la creatividad hecha a mano y en la personalizaci\u00f3n como la forma m\u00e1s honesta de decir "esto es para ti".


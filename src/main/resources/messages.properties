# Con\u00f3cenos / Historia del emprendimiento (Inicio, HU-07)
conocenos.titulo=Con\u00f3cenos
conocenos.texto=Hey Artcraft nace como un emprendimiento dedicado a crear detalles personalizados que transforman momentos especiales en recuerdos \u00fanicos. Su historia inicia con la pasi\u00f3n por el arte, la creatividad y el trabajo hecho a mano, ofreciendo productos en madera y acr\u00edlico dise\u00f1ados para bodas, aniversarios, cumplea\u00f1os y eventos importantes. Cada pieza se elabora con dedicaci\u00f3n, cuidando cada detalle para que los clientes puedan conservar sus mejores recuerdos de una forma elegante, significativa y completamente personalizada.

